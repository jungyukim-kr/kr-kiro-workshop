<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블오더 - 고객</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand navbar-dark bg-dark fixed-top" id="main-header" style="display:none;">
        <div class="container-fluid">
            <span class="navbar-brand" id="header-store-info">
                <i class="bi bi-shop"></i> <span id="header-store-name">매장</span> - 테이블 <span id="header-table-number">0</span>
            </span>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#/menu" id="nav-menu">메뉴</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#/history" id="nav-history">주문내역</a>
                </li>
                <li class="nav-item">
                    <button class="btn btn-outline-light btn-sm position-relative ms-2" id="btn-cart-open" type="button">
                        <i class="bi bi-cart3"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-badge" style="display:none;">0</span>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Views -->
    <div id="view-login" class="view-container" style="display:none;">
        <div class="container mt-5 pt-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <h3 class="card-title text-center mb-4"><i class="bi bi-shop"></i> 테이블오더</h3>
                            <form id="login-form">
                                <div class="mb-3">
                                    <label for="input-store-code" class="form-label">매장 식별자</label>
                                    <input type="text" class="form-control" id="input-store-code" required>
                                </div>
                                <div class="mb-3">
                                    <label for="input-table-number" class="form-label">테이블 번호</label>
                                    <input type="number" class="form-control" id="input-table-number" min="1" required>
                                </div>
                                <div class="mb-3">
                                    <label for="input-pin" class="form-label">PIN (4자리)</label>
                                    <input type="password" class="form-control" id="input-pin" maxlength="4" pattern="\d{4}" required>
                                </div>
                                <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
                                <button type="submit" class="btn btn-primary w-100">로그인</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-menu" class="view-container" style="display:none;">
        <div class="container-fluid mt-5 pt-3">
            <div id="category-tabs" class="nav nav-pills flex-nowrap overflow-auto mb-3 px-2"></div>
            <div id="menu-grid" class="row g-3 px-2"></div>
        </div>
    </div>

    <div id="view-order" class="view-container" style="display:none;">
        <div class="container mt-5 pt-3">
            <div class="d-flex align-items-center mb-3">
                <a href="#/menu" class="btn btn-outline-secondary btn-sm me-2"><i class="bi bi-arrow-left"></i></a>
                <h4 class="mb-0">주문 확인</h4>
            </div>
            <div id="order-items-list"></div>
            <div class="fixed-bottom bg-white border-top p-3" id="order-footer">
                <div class="container d-flex justify-content-between align-items-center">
                    <span class="fw-bold fs-5">총 <span id="order-total-amount">0</span>원</span>
                    <button class="btn btn-primary btn-lg" id="btn-submit-order">주문 확정</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-history" class="view-container" style="display:none;">
        <div class="container mt-5 pt-3">
            <h4 class="mb-3">주문 내역</h4>
            <div id="order-history-list"></div>
            <div id="history-empty" class="text-center text-muted py-5" style="display:none;">
                <i class="bi bi-receipt fs-1"></i>
                <p class="mt-2">주문 내역이 없습니다</p>
            </div>
            <div id="history-sentinel"></div>
            <div id="history-loading" class="text-center py-3" style="display:none;">
                <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
        </div>
    </div>

    <!-- Cart Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cart-offcanvas" aria-labelledby="cart-offcanvas-label">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="cart-offcanvas-label"><i class="bi bi-cart3"></i> 장바구니</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body" id="cart-items-container">
            <div id="cart-empty" class="text-center text-muted py-5">
                <i class="bi bi-cart-x fs-1"></i>
                <p class="mt-2">장바구니가 비어있습니다</p>
            </div>
            <div id="cart-items-list"></div>
        </div>
        <div class="offcanvas-footer border-top p-3" id="cart-footer" style="display:none;">
            <div class="d-flex justify-content-between mb-2">
                <button class="btn btn-outline-danger btn-sm" id="btn-cart-clear">비우기</button>
                <span class="fw-bold">총 <span id="cart-total-amount">0</span>원</span>
            </div>
            <a href="#/order" class="btn btn-primary w-100" id="btn-cart-order" data-bs-dismiss="offcanvas">주문하기</a>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="app-toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-body" id="toast-message"></div>
        </div>
    </div>

    <!-- Spinner -->
    <div id="app-spinner" class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-white bg-opacity-75" style="display:none !important; z-index:9999;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/order.js"></script>
    <script src="js/order-history.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
