spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tableorder}
    username: ${DB_USER:tableorder}
    password: ${DB_PASSWORD:tableorder}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-jwt-signing-at-least-256-bits-long!!}
    expiration-ms: 57600000  # 16 hours
