<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Unit 4 Frontend Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        h1 { color: #569cd6; }
        #results { white-space: pre-wrap; }
        .pass { color: #4ec9b0; }
        .fail { color: #f44747; }
    </style>
</head>
<body>
    <h1>Unit 4 - 고객 프론트엔드 테스트</h1>
    <div id="results"></div>

    <!-- 테스트 유틸 -->
    <script src="test-utils.js"></script>

    <!-- 소스 코드 (테스트 대상) -->
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/order-history.js"></script>

    <!-- 테스트 파일 -->
    <script src="cart.test.js"></script>
    <script src="api.test.js"></script>
    <script src="auth.test.js"></script>
    <script src="order-history.test.js"></script>

    <!-- 테스트 실행 -->
    <script>
        (async function () {
            TestUtils.reset();
            console.log('=== Unit 4 Frontend Tests ===\n');

            // Cart 테스트
            if (typeof CartTests !== 'undefined') CartTests.run();

            // API 테스트
            if (typeof ApiTests !== 'undefined') await ApiTests.run();

            // Auth 테스트
            if (typeof AuthTests !== 'undefined') await AuthTests.run();

            // OrderHistory 테스트
            if (typeof OrderHistoryTests !== 'undefined') OrderHistoryTests.run();

            const result = TestUtils.summary();
            document.getElementById('results').innerHTML =
                `<span class="${result.failed === 0 ? 'pass' : 'fail'}">` +
                `Total: ${result.total}, Passed: ${result.passed}, Failed: ${result.failed}` +
                `</span>`;
        })();
    </script>
</body>
</html>
