services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tableorder
      POSTGRES_USER: tableorder
      POSTGRES_PASSWORD: tableorder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tableorder"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tableorder
      DB_USER: tableorder
      DB_PASSWORD: tableorder
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend

volumes:
  pgdata:
